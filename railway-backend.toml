# Railway.app configuration for Deutschly Backend (FastAPI)
# This file is for deploying only the backend service

[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
name = "deutschly-backend"
internalPort = 8000
protocol = "http"
env = {
  # Database configuration - use Railway PostgreSQL
  DATABASE_URL = "${{ DATABASE_URL }}",
  
  # Telegram bot configuration
  TELEGRAM_BOT_TOKEN = "${{ TELEGRAM_BOT_TOKEN }}",
  WEBHOOK_URL = "${{ RAILWAY_PUBLIC_DOMAIN }}",
  
  # Security
  SECRET_KEY = "${{ SECRET_KEY }}",
  
  # CORS settings - allow frontend domain
  FRONTEND_ORIGIN = "https://${{ FRONTEND_DOMAIN }}"
}

buildCommand = "pip install -r requirements.txt"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8000"

# Required environment variables to set in Railway:
# DATABASE_URL - PostgreSQL connection string (Railway provides this)
# TELEGRAM_BOT_TOKEN - Your bot token from @BotFather
# SECRET_KEY - Random secret key (generate with: openssl rand -hex 32)
# FRONTEND_DOMAIN - Your frontend domain (e.g., deutschly-web-production.up.railway.app)

# After deployment:
# 1. The backend will be available at: https://${{ RAILWAY_PUBLIC_DOMAIN }}
# 2. Telegram webhook will be automatically set to: https://${{ RAILWAY_PUBLIC_DOMAIN }}/api/v1/telegram/webhook
# 3. API documentation will be available at: https://${{ RAILWAY_PUBLIC_DOMAIN }}/docs