# Railway.app deployment configuration for Deutschly
# This file configures both backend and frontend services

[build]
# Build configuration for the FastAPI backend
builder = "NIXPACKS"

[deploy]
# Deployment settings
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
# FastAPI Backend Service
name = "deutschly-backend"
internalPort = 8000
protocol = "http"
env = {
  DATABASE_URL = "${{ DATABASE_URL }}",
  TELEGRAM_BOT_TOKEN = "${{ TELEGRAM_BOT_TOKEN }}",
  WEBHOOK_URL = "${{ RAILWAY_PUBLIC_DOMAIN }}",
  SECRET_KEY = "${{ SECRET_KEY }}"
}
buildCommand = "pip install -r requirements.txt"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

[[services]]
# Frontend Service (React/Vite)
name = "deutschly-frontend"
internalPort = 80
protocol = "http"
env = {
  VITE_API_URL = "https://${{ RAILWAY_PUBLIC_DOMAIN }}",
  VITE_TELEGRAM_BOT_NAME = "Deutschly"
}
buildCommand = "cd webapp && npm install && npm run build"
startCommand = "cd webapp && npx serve -s dist -l 80"

# Environment variables that need to be set in Railway
# DATABASE_URL: Your PostgreSQL connection string
# TELEGRAM_BOT_TOKEN: Your Telegram bot token from @BotFather
# SECRET_KEY: Random secret key for your application
# RAILWAY_PUBLIC_DOMAIN: Automatically set by Railway

# After deployment:
# 1. The backend will automatically set up Telegram webhook to:
#    https://your-app.up.railway.app/api/v1/telegram/webhook
# 2. The frontend will be served from the root domain
# 3. API requests will be proxied to the backend service