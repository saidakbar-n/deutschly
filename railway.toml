# Railway.app deployment configuration for Deutschly
# This file configures the BACKEND ONLY deployment

[build]
# Build configuration
builder = "NIXPACKS"

[deploy]
# Deployment settings
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
# Backend API Service only
name = "deutschly-backend"
internalPort = 8000
protocol = "http"
env = {
  # Backend configuration
  DATABASE_URL = "${{ DATABASE_URL }}",
  SECRET_KEY = "${{ SECRET_KEY }}",
}

# Build backend only (no frontend build)
buildCommand = "pip install -r requirements.txt"

# Start backend only
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

# Environment variables that need to be set in Railway:
# DATABASE_URL: Your PostgreSQL connection string (Railway provides this)
# SECRET_KEY: Random secret key (generate with: openssl rand -hex 32)
# RAILWAY_PUBLIC_DOMAIN: Automatically set by Railway

# After deployment:
# 1. Backend API will be served from: https://${{ RAILWAY_PUBLIC_DOMAIN }}/api/v1/*
# 2. API docs: https://${{ RAILWAY_PUBLIC_DOMAIN }}/docs
# 3. Frontend should be deployed separately and configured to point to this backend
