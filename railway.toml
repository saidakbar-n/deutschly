# Railway.app deployment configuration for Deutschly
# This file configures the MONOLITHIC deployment (backend + frontend in one service)

[build]
# Build configuration
builder = "NIXPACKS"

[deploy]
# Deployment settings
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
# Combined Backend + Frontend Service
name = "deutschly-app"
internalPort = 8000
protocol = "http"
env = {
  # Backend configuration
  DATABASE_URL = "${{ DATABASE_URL }}",
  TELEGRAM_BOT_TOKEN = "${{ TELEGRAM_BOT_TOKEN }}",
  WEBHOOK_URL = "${{ RAILWAY_PUBLIC_DOMAIN }}",
  SECRET_KEY = "${{ SECRET_KEY }}",
  
  # Frontend configuration (for when we serve frontend from backend)
  FRONTEND_BUILD_DIR = "./webapp/dist",
  VITE_TELEGRAM_BOT_NAME = "Deutschly"
}

# Build both backend and frontend
buildCommand = "pip install -r requirements.txt && cd webapp && npm install && npm run build && cd .."

# Start backend (frontend is served statically by backend)
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

# Environment variables that need to be set in Railway:
# DATABASE_URL: Your PostgreSQL connection string (Railway provides this)
# TELEGRAM_BOT_TOKEN: Your Telegram bot token from @BotFather (e.g., 8722275184:AAG2-gSJnRf6ellm4Dynto8RVuFkJTkQGR4)
# SECRET_KEY: Random secret key (generate with: openssl rand -hex 32)
# RAILWAY_PUBLIC_DOMAIN: Automatically set by Railway (will be web-production-25fc.up.railway.app)

# After deployment:
# 1. Everything will be served from: https://${{ RAILWAY_PUBLIC_DOMAIN }}
# 2. Frontend: https://${{ RAILWAY_PUBLIC_DOMAIN }}/
# 3. Backend API: https://${{ RAILWAY_PUBLIC_DOMAIN }}/api/v1/*
# 4. Telegram webhook: https://${{ RAILWAY_PUBLIC_DOMAIN }}/api/v1/telegram/webhook
# 5. API docs: https://${{ RAILWAY_PUBLIC_DOMAIN }}/docs