# Railway.app configuration for Deutschly Frontend (React/Vite)
# This file is for deploying only the frontend service

[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
name = "deutschly-frontend"
internalPort = 3000
protocol = "http"
env = {
  # API endpoint configuration
  VITE_API_URL = "https://${{ BACKEND_DOMAIN }}",
  
  # Telegram login configuration
  VITE_TELEGRAM_BOT_NAME = "Deutschly"
}

buildCommand = "cd webapp && npm install && npm run build"
startCommand = "cd webapp && npx serve -s dist -l 3000"

# Required environment variables to set in Railway:
# BACKEND_DOMAIN - Your backend domain (e.g., deutschly-backend-production.up.railway.app)

# After deployment:
# 1. The frontend will be available at: https://${{ RAILWAY_PUBLIC_DOMAIN }}
# 2. All API requests will be proxied to the backend service
# 3. Telegram login will work with the connected backend